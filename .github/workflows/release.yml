name: Release
run-name: ${{ startsWith(inputs.version, 'v') && format('Release {0}', inputs.version) || format('Release v{0}', inputs.version) }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.1.1 or v1.1.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor == 'aarondfrancis'

    steps:
      - name: Validate and normalize version
        id: version
        run: |
          VERSION_RAW="${{ inputs.version }}"

          if ! [[ "$VERSION_RAW" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '$VERSION_RAW'. Expected X.Y.Z or vX.Y.Z"
            exit 1
          fi

          VERSION="${VERSION_RAW#v}"

          echo "normalized=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.normalized }}"

          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z]" until the next "## [" or end of file
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "No changelog entry found for version $VERSION"
            exit 1
          fi

          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.md

      - name: Create and push tag
        run: |
          VERSION="${{ steps.version.outputs.normalized }}"
          TAG_NAME="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release v$VERSION"
          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
